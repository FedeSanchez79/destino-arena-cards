<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agustina Albornoz &ndash; Destino Arena</title>
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#160f2e;
    --bg-card:#211749;
    --bg-card-2:#2b1d5c;
    --magenta:#ff2e88;
    --amber:#ffb627;
    --text-primary:#f5f1ff;
    --text-muted:#a89bc9;
    --hairline:rgba(245,241,255,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 18% -10%, rgba(255,46,136,0.18), transparent 45%),
      radial-gradient(circle at 90% 110%, rgba(255,182,39,0.12), transparent 50%),
      var(--bg-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
  }
  .card{
    position:relative;
    width:100%;
    max-width:380px;
    background:linear-gradient(165deg, var(--bg-card), var(--bg-card-2));
    border-radius:22px;
    padding:30px 26px 24px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
    overflow:hidden;
    animation:rise 0.5s ease-out;
  }
  @media (prefers-reduced-motion: reduce){ .card{animation:none;} }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .hole{
    width:34px;height:8px;
    background:var(--bg-deep);
    border-radius:6px;
    margin:0 auto 22px;
    box-shadow:0 1px 0 rgba(255,255,255,0.05) inset;
  }
  .ribbon{
    position:absolute;
    top:18px; right:-42px;
    width:160px;
    transform:rotate(40deg);
    background:var(--magenta);
    color:#fff;
    font-family:'Space Mono',monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.12em;
    text-align:center;
    padding:4px 0;
    box-shadow:0 4px 10px rgba(255,46,136,0.35);
  }
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .role{
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--text-muted);
    text-transform:uppercase;
    margin:0 0 14px;
  }
  .nombre{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(30px, 8vw, 38px);
    line-height:1.05;
    letter-spacing:0.01em;
    margin:0 0 18px;
    word-wrap:break-word;
  }
  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--magenta), transparent);
    margin:0 0 18px;
    opacity:0.6;
  }
  .fila{
    display:block;
    padding:10px 0;
    border-bottom:1px solid var(--hairline);
    text-decoration:none;
    color:inherit;
  }
  .fila:last-of-type{border-bottom:none;}
  .label{
    display:block;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:3px;
  }
  .valor{
    display:block;
    font-size:15px;
    font-weight:600;
    color:var(--text-primary);
  }
  a.fila .valor{color:var(--amber);}
  .vacio{
    font-size:13px;
    font-style:italic;
    color:var(--text-muted);
    padding:14px 0;
  }
  .footer{
    margin-top:20px;
    padding-top:16px;
    border-top:1px dashed var(--hairline);
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:var(--text-muted);
    letter-spacing:0.06em;
  }
  .cta{
    display:block;
    text-align:center;
    margin-top:16px;
    padding:13px 0;
    border-radius:999px;
    background:var(--amber);
    color:var(--bg-deep);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    text-decoration:none;
  }
  .cta:active{filter:brightness(0.92);}
</style>
</head>
