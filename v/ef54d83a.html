<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angibel Cardenas &ndash; Only by Destino Arena</title>
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0710;
    --bg-card:#16101f;
    --bg-card-2:#1f1530;
    --purple:#8b5cf6;
    --purple-deep:#5b21b6;
    --glow:#c4b5fd;
    --white:#f7f5fb;
    --muted:#938aa3;
    --hairline:rgba(247,245,251,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    position:relative;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:36px 16px;
    font-family:'Inter',sans-serif;
    color:var(--white);
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed;
    top:-180px; left:50%;
    transform:translateX(-50%);
    width:520px; height:420px;
    background:radial-gradient(circle, rgba(139,92,246,0.55), rgba(139,92,246,0) 70%);
    filter:blur(10px);
    pointer-events:none;
    z-index:0;
  }
  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:380px;
    background:linear-gradient(165deg, var(--bg-card), var(--bg-card-2));
    border:1px solid rgba(139,92,246,0.25);
    border-radius:24px;
    padding:30px 26px 26px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,0.7), 0 0 40px -10px rgba(139,92,246,0.25);
    animation:rise 0.5s ease-out;
  }
  @media (prefers-reduced-motion: reduce){ .card{animation:none;} }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .logo{
    display:block;
    height:34px;
    width:auto;
    margin:0 auto 20px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1.5px solid var(--purple);
    color:var(--glow);
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:18px;
  }
  .badge::before{content:'+';color:var(--purple);font-weight:700;}
  .nombre{
    font-family:'Unbounded',sans-serif;
    font-weight:800;
    font-size:clamp(28px, 8vw, 36px);
    line-height:1.08;
    margin:0 0 20px;
    word-wrap:break-word;
  }
  .nombre .pri{color:var(--white);}
  .nombre .sec{color:var(--purple);}
  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--purple), transparent);
    margin:0 0 16px;
    opacity:0.7;
  }
  .fila{
    display:block;
    padding:11px 0;
    border-bottom:1px solid var(--hairline);
    text-decoration:none;
    color:inherit;
  }
  .fila:last-of-type{border-bottom:none;}
  .label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
  }
  .label .arrow{color:var(--purple); font-weight:700;}
  .valor{
    display:block;
    font-size:15px;
    font-weight:600;
    color:var(--white);
    padding-left:16px;
  }
  a.fila .valor{color:var(--glow);}
  .vacio{
    font-size:13px;
    font-style:italic;
    color:var(--muted);
    padding:14px 0;
  }
  .footer{
    margin-top:20px;
    padding-top:16px;
    border-top:1px dashed var(--hairline);
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    letter-spacing:0.06em;
  }
  .cta{
    display:block;
    text-align:center;
    margin-top:16px;
    padding:14px 0;
    border-radius:999px;
    background:linear-gradient(120deg, var(--purple), var(--purple-deep));
    color:var(--white);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    text-decoration:none;
    box-shadow:0 10px 24px -10px rgba(139,92,246,0.6);
  }
  .cta:active{filter:brightness(0.9);}
</style>
</head>
